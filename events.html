<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events - UK Data & AI Community</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="events-page">
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
      🌙
    </button>

    <header class="hero hero-small">
      <div class="hero-content">
        <h1>Events</h1>
        <!-- <p class="tagline">
          Discover Data & AI sessions for tech enthusiasts
        </p> -->
      </div>
    </header>

    <nav class="top-nav">
      <a href="index.html" class="nav-home" aria-label="Back to home">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
        Home
      </a>
    </nav>

    <main class="container">

      <section class="events-list">
        <h2>In-Person Events</h2>
        <div id="upcoming-events"></div>

        <h2>Virtual Events</h2>
        <div id="virtual-events"></div>

        <h2>Partner Events</h2>
        <div id="partner-events"></div>
      </section>
    </main>

    <script>
      (function () {
        const storageKey = "uk-data-ai-theme";
        const toggle = document.getElementById("theme-toggle");

        function setTheme(theme) {
          document.body.setAttribute("data-theme", theme);
          toggle.textContent = theme === "dark" ? "☀️" : "🌙";
          toggle.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
          localStorage.setItem(storageKey, theme);
        }

        function getInitialTheme() {
          const saved = localStorage.getItem(storageKey);
          if (saved === "dark" || saved === "light") {
            return saved;
          }
          return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        toggle.addEventListener("click", function () {
          const next = document.body.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(next);
        });

        setTheme(getInitialTheme());
      })();

      // Load and render events from JSON
      async function loadEvents() {
        try {
          const response = await fetch("events.json");
          const data = await response.json();

          // Filter and render in-person and conference events together
          const upcomingContainer = document.getElementById("upcoming-events");
          const inPersonEvents = data.events.filter(
            (event) => event.type === "in-person" || event.type === "conference"
          );
          inPersonEvents.forEach((event) => {
            upcomingContainer.appendChild(createEventCard(event));
          });

          // Filter and render virtual events
          const virtualContainer = document.getElementById("virtual-events");
          const virtualEvents = data.events.filter(
            (event) => event.type === "virtual",
          );
          virtualEvents.forEach((event) => {
            virtualContainer.appendChild(createEventCard(event));
          });

          // Filter and render partner events
          const partnerContainer = document.getElementById("partner-events");
          const partnerEvents = data.events.filter(
            (event) => event.type === "partner",
          );
          partnerEvents.forEach((event) => {
            partnerContainer.appendChild(createEventCard(event));
          });
        } catch (error) {
          console.error("Error loading events:", error);
        }
      }

      // Create an event card element
      function createEventCard(event) {
        const card = document.createElement("div");
        card.className = "event-card";

        card.innerHTML = `
          <div class="event-date">
            <span class="month">${event.month}</span>
            <span class="day">${event.day}</span>
          </div>
          <div class="event-details">
            <h3>${event.title}</h3>
            <p class="event-time">🕐 ${event.time}</p>
            ${event.location ? `<p class="event-location">📍 ${event.location}</p>` : ""}
            <p class="event-desc">${event.description}</p>
            <a href="${event.link}" target="_blank" class="event-link">More Info</a>
          </div>
        `;

        return card;
      }

      // Load events when page loads
      loadEvents();
    </script>

    <footer>
      <p>&copy; 2026 UK Data & AI Community</p>
    </footer>
    <script src="animations.js" defer></script>
  </body>
</html>
